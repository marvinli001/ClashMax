name: Feedback
description: Share actionable product feedback for ClashMax.
title: "[Feedback]: "
body:
  - type: markdown
    attributes:
      value: |
        Use Issues for actionable feedback that is already clear enough to become a tracked task. Use Discussions -> Ideas for early feature ideas, product direction, and open-ended workflow conversation.
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What concrete behavior should be improved, and why does it matter in daily proxy use?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard
        - Profiles
        - Proxies
        - Connections
        - Rules
        - Logs
        - Settings
        - Menu bar
        - System Proxy
        - TUN helper
        - NE Transparent Proxy Experimental
        - Downloads / updates
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: current_workflow
    attributes:
      label: Current workflow
      description: Describe how you use ClashMax today and where the experience breaks down.
