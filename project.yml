name: ClashMax
options:
  bundleIdPrefix: io.github.clashmax
  developmentLanguage: en
  useBaseInternationalization: false
  fileTypes:
    icon:
      file: true
      buildPhase: resources
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: 678WA95W4U
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Developer ID Application"
    ENABLE_HARDENED_RUNTIME: YES
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ONLY_ACTIVE_ARCH: NO
      CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "6.2.1"
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"
  SwiftUIShimmer:
    url: https://github.com/markiv/SwiftUI-Shimmer.git
    from: "1.5.1"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.2"
targets:
  ClashMax:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: ClashMax
        excludes:
          - AppIcon.icon
          - AppIcon.icon/**
      - path: ClashMax/AppIcon.icon
        buildPhase: resources
        type: file
      - path: Resources
        buildPhase: resources
        excludes:
          - Core
          - Core/**
    info:
      path: Config/ClashMax-Info.plist
      properties:
        CFBundleDisplayName: ClashMax
        CFBundleURLTypes:
          - CFBundleURLName: io.github.clashmax.subscription
            CFBundleURLSchemes:
              - clash
              - clash-verge
              - clashmeta
              - flclash
              - clashmax
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: GPL-3.0
        NSSystemExtensionUsageDescription: ClashMax uses NE Proxy to route TCP and UDP traffic through its local Mihomo proxy without enabling System Proxy or the privileged TUN helper.
        SUFeedURL: https://marvinli001.github.io/ClashMax/appcast.xml
        SUPublicEDKey: "Gh5U2F2/392N+X0I2t1ojmM3uHPYKR2Ceww618dTaLc="
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: false
    dependencies:
      - package: Yams
      - package: Pow
      - package: SwiftUIShimmer
        product: Shimmer
      - package: Sparkle
      - target: ClashMaxHelper
        embed: false
        link: false
      - target: ClashMaxNetworkExtension
        embed: false
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax
        PRODUCT_NAME: ClashMax
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: 1.0.13
        CURRENT_PROJECT_VERSION: 19
        PROVISIONING_PROFILE_SPECIFIER: ClashMax Developer ID
    entitlements:
      path: Config/ClashMax.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - app-proxy-provider-systemextension
        com.apple.developer.system-extension.install: true
        com.apple.security.application-groups:
          - group.678WA95W4U.io.github.clashmax.ClashMax.network-extension
    postCompileScripts:
      - name: Embed Helper
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/ClashMaxHelper"
          - "$(SRCROOT)/Config/io.github.clashmax.ClashMax.Helper.plist"
          - "$(SRCROOT)/Resources/Core/README.md"
          - "$(SRCROOT)/Resources/Core/mihomo-darwin-amd64"
          - "$(SRCROOT)/Resources/Core/mihomo-darwin-arm64"
          - "$(SRCROOT)/Resources/Core/mihomo-manifest.json"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchServices/ClashMaxHelper"
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchDaemons/io.github.clashmax.ClashMax.Helper.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/README.md"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-darwin-amd64"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-darwin-arm64"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-manifest.json"
        script: |
          set -euo pipefail
          launch_services="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchServices"
          legacy_macos_helper="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/MacOS/ClashMaxHelper"
          launch_daemons="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          core_resources="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Core"
          mkdir -p "$launch_services" "$launch_daemons" "$core_resources"
          rm -f "$legacy_macos_helper"
          cp "$BUILT_PRODUCTS_DIR/ClashMaxHelper" "$launch_services/ClashMaxHelper"
          cp "$SRCROOT/Config/io.github.clashmax.ClashMax.Helper.plist" "$launch_daemons/io.github.clashmax.ClashMax.Helper.plist"
          cp -R "$SRCROOT/Resources/Core/." "$core_resources/"
      - name: Embed Network Extension
        basedOnDependencyAnalysis: false
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/io.github.clashmax.ClashMax.NetworkExtension.systemextension"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/SystemExtensions/io.github.clashmax.ClashMax.NetworkExtension.systemextension"
        script: |
          set -euo pipefail
          source_extension="$BUILT_PRODUCTS_DIR/io.github.clashmax.ClashMax.NetworkExtension.systemextension"
          system_extensions="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/SystemExtensions"
          target_extension="$system_extensions/io.github.clashmax.ClashMax.NetworkExtension.systemextension"

          mkdir -p "$system_extensions"
          rm -rf "$target_extension"
          cp -R -L "$source_extension" "$target_extension"
          if [ -L "$target_extension" ] || [ ! -d "$target_extension/Contents" ]; then
            echo "Embedded Network Extension copy is invalid: $target_extension"
            exit 1
          fi
          xattr -cr "$target_extension" || true
      - name: Sign Nested Core Binaries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          core_resources="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Core"
          sign_identity="${EXPANDED_CODE_SIGN_IDENTITY:-}"
          sign_identity_name="${EXPANDED_CODE_SIGN_IDENTITY_NAME:-}"
          sign_identity_label="${sign_identity_name:-${CODE_SIGN_IDENTITY:-}}"
          if [ -z "$sign_identity" ]; then
            sign_identity="$sign_identity_label"
          fi

          should_sign="YES"
          if [ "${CODE_SIGNING_ALLOWED:-NO}" != "YES" ]; then
            should_sign="NO"
          fi
          if [ -z "$sign_identity" ] || [ "$sign_identity" = "-" ]; then
            should_sign="NO"
          fi

          core_signing_identifier() {
            case "$(basename "$1")" in
              mihomo-darwin-arm64) printf '%s\n' "io.github.clashmax.ClashMax.Mihomo.arm64" ;;
              mihomo-darwin-amd64) printf '%s\n' "io.github.clashmax.ClashMax.Mihomo.amd64" ;;
              *) return 1 ;;
            esac
          }

          for core_binary in "$core_resources"/mihomo-darwin-*; do
            if [ ! -f "$core_binary" ]; then
              continue
            fi

            chmod +x "$core_binary"
            xattr -cr "$core_binary" || true

            if [ "$should_sign" != "YES" ]; then
              echo "Skipping nested core signing for $core_binary because code signing is disabled or no identity is available."
              continue
            fi
            if ! core_identifier="$(core_signing_identifier "$core_binary")"; then
              echo "Skipping nested core signing for unknown Mihomo binary: $core_binary"
              continue
            fi

            timestamp_arg="--timestamp=none"
            if [ "${CONFIGURATION:-Debug}" = "Release" ]; then
              case "$sign_identity_label" in
                Developer\ ID\ Application:*) timestamp_arg="--timestamp" ;;
              esac
            fi

            echo "Signing nested core binary with hardened runtime: $core_binary ($core_identifier)"
            /usr/bin/codesign --force --options runtime "$timestamp_arg" \
              --identifier "$core_identifier" \
              --sign "$sign_identity" "$core_binary"
            /usr/bin/codesign --verify --strict --verbose=2 "$core_binary"
          done

    postBuildScripts:
      - name: Clean Bundle Extended Attributes
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          if [ -d "$TARGET_BUILD_DIR/$WRAPPER_NAME" ]; then
            xattr -cr "$TARGET_BUILD_DIR/$WRAPPER_NAME"
          fi
  ClashMaxHelper:
    type: tool
    platform: macOS
    sources:
      - path: Shared
      - path: ClashMaxHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax.Helper
        PRODUCT_NAME: ClashMaxHelper
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Config/ClashMaxHelper-Info.plist
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        MACH_O_TYPE: mh_execute
        SKIP_INSTALL: YES
        PROVISIONING_PROFILE_SPECIFIER: ""
    entitlements:
      path: Config/ClashMaxHelper.entitlements
  ClashMaxNetworkExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Shared/Socks5ConnectRequest.swift
      - path: Shared/NetworkExtensionRuntimeConstants.swift
      - path: ClashMaxNetworkExtension
    info:
      path: Config/ClashMaxNetworkExtension-Info.plist
      properties:
        CFBundleDisplayName: ClashMax Network Extension
        CFBundlePackageType: SYSX
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSSystemExtensionUsageDescription: ClashMax uses NE Proxy to route TCP and UDP traffic through its local Mihomo proxy without enabling System Proxy or the privileged TUN helper.
        NetworkExtension:
          NEMachServiceName: group.678WA95W4U.io.github.clashmax.ClashMax.network-extension
          NEProviderClasses:
            com.apple.networkextension.app-proxy: "$(PRODUCT_MODULE_NAME).TransparentProxyProvider"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax.NetworkExtension
        PRODUCT_NAME: io.github.clashmax.ClashMax.NetworkExtension
        PRODUCT_MODULE_NAME: ClashMaxNetworkExtension
        INFOPLIST_FILE: Config/ClashMaxNetworkExtension-Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: 1.0.13
        CURRENT_PROJECT_VERSION: 19
        PROVISIONING_PROFILE_SPECIFIER: ClashMax NetworkExtension Developer ID
    entitlements:
      path: Config/ClashMaxNetworkExtension.entitlements
      properties:
        com.apple.developer.networking.networkextension:
          - app-proxy-provider-systemextension
        com.apple.security.application-groups:
          - group.678WA95W4U.io.github.clashmax.ClashMax.network-extension
    postCompileScripts:
      - name: Clean Network Extension Extended Attributes
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          product="$TARGET_BUILD_DIR/$WRAPPER_NAME"
          if [ -d "$product" ]; then
            xattr -cr "$product" || true
          fi
  ClashMaxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClashMaxTests
    dependencies:
      - target: ClashMax
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMaxTests
        GENERATE_INFOPLIST_FILE: YES
        PROVISIONING_PROFILE_SPECIFIER: ""
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClashMax.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ClashMax"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  ClashMax:
    build:
      targets:
        ClashMax: all
        ClashMaxNetworkExtension: all
        ClashMaxTests: [test]
    run:
      config: Debug
      executable: ClashMax
    test:
      config: Debug
      targets:
        - ClashMaxTests
    profile:
      config: Release
      executable: ClashMax
    analyze:
      config: Debug
    archive:
      config: Release
