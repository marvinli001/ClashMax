name: ClashMax
options:
  bundleIdPrefix: io.github.clashmax
  developmentLanguage: en
  useBaseInternationalization: false
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
  configs:
    Debug:
      ONLY_ACTIVE_ARCH: YES
    Release:
      ONLY_ACTIVE_ARCH: NO
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "6.2.1"
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.1"
targets:
  ClashMax:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: ClashMax
      - path: Resources
        buildPhase: resources
        excludes:
          - Core
          - Core/**
    info:
      path: Config/ClashMax-Info.plist
      properties:
        CFBundleDisplayName: ClashMax
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.utilities
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: GPL-3.0
        SUFeedURL: https://marvinli001.github.io/ClashMax/appcast.xml
        SUPublicEDKey: "Gh5U2F2/392N+X0I2t1ojmM3uHPYKR2Ceww618dTaLc="
        SUEnableAutomaticChecks: true
        SUAutomaticallyUpdate: false
    dependencies:
      - package: Yams
      - package: Pow
      - package: Sparkle
      - target: ClashMaxHelper
        embed: false
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax
        PRODUCT_NAME: ClashMax
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        MARKETING_VERSION: 1.0.1
        CURRENT_PROJECT_VERSION: 3
    entitlements:
      path: Config/ClashMax.entitlements
    postCompileScripts:
      - name: Embed Helper
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/ClashMaxHelper"
          - "$(SRCROOT)/Config/io.github.clashmax.ClashMax.Helper.plist"
          - "$(SRCROOT)/Resources/Core/README.md"
          - "$(SRCROOT)/Resources/Core/mihomo-darwin-amd64"
          - "$(SRCROOT)/Resources/Core/mihomo-darwin-arm64"
          - "$(SRCROOT)/Resources/Core/mihomo-manifest.json"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchServices/ClashMaxHelper"
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchDaemons/io.github.clashmax.ClashMax.Helper.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/README.md"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-darwin-amd64"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-darwin-arm64"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-manifest.json"
        script: |
          set -euo pipefail
          launch_services="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchServices"
          launch_daemons="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          core_resources="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Core"
          mkdir -p "$launch_services" "$launch_daemons" "$core_resources"
          cp "$BUILT_PRODUCTS_DIR/ClashMaxHelper" "$launch_services/ClashMaxHelper"
          cp "$SRCROOT/Config/io.github.clashmax.ClashMax.Helper.plist" "$launch_daemons/io.github.clashmax.ClashMax.Helper.plist"
          cp -R "$SRCROOT/Resources/Core/." "$core_resources/"
      - name: Sign Nested Core Binaries
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail

          core_resources="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Core"
          sign_identity="${EXPANDED_CODE_SIGN_IDENTITY:-}"
          sign_identity_name="${EXPANDED_CODE_SIGN_IDENTITY_NAME:-}"
          sign_identity_label="${sign_identity_name:-${CODE_SIGN_IDENTITY:-}}"
          if [ -z "$sign_identity" ]; then
            sign_identity="$sign_identity_label"
          fi

          should_sign="YES"
          if [ "${CODE_SIGNING_ALLOWED:-NO}" != "YES" ]; then
            should_sign="NO"
          fi
          if [ -z "$sign_identity" ] || [ "$sign_identity" = "-" ]; then
            should_sign="NO"
          fi

          for core_binary in "$core_resources"/mihomo-darwin-*; do
            if [ ! -f "$core_binary" ]; then
              continue
            fi

            chmod +x "$core_binary"
            xattr -cr "$core_binary" || true

            if [ "$should_sign" != "YES" ]; then
              echo "Skipping nested core signing for $core_binary because code signing is disabled or no identity is available."
              continue
            fi

            timestamp_arg="--timestamp=none"
            case "$sign_identity_label" in
              Developer\ ID\ Application:*) timestamp_arg="--timestamp" ;;
            esac

            echo "Signing nested core binary with hardened runtime: $core_binary"
            /usr/bin/codesign --force --options runtime "$timestamp_arg" --sign "$sign_identity" "$core_binary"
            /usr/bin/codesign --verify --strict --verbose=2 "$core_binary"
          done
    postBuildScripts:
      - name: Clean Bundle Extended Attributes
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          if [ -d "$TARGET_BUILD_DIR/$WRAPPER_NAME" ]; then
            xattr -cr "$TARGET_BUILD_DIR/$WRAPPER_NAME"
          fi
  ClashMaxHelper:
    type: tool
    platform: macOS
    sources:
      - path: Shared
      - path: ClashMaxHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax.Helper
        PRODUCT_NAME: ClashMaxHelper
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Config/ClashMaxHelper-Info.plist
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        MACH_O_TYPE: mh_execute
    entitlements:
      path: Config/ClashMaxHelper.entitlements
  ClashMaxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClashMaxTests
    dependencies:
      - target: ClashMax
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMaxTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClashMax.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ClashMax"
        BUNDLE_LOADER: "$(TEST_HOST)"
schemes:
  ClashMax:
    build:
      targets:
        ClashMax: all
        ClashMaxTests: [test]
    run:
      config: Debug
      executable: ClashMax
    test:
      config: Debug
      targets:
        - ClashMaxTests
    profile:
      config: Release
      executable: ClashMax
    analyze:
      config: Debug
    archive:
      config: Release
