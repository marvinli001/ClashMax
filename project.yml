name: ClashMax
options:
  bundleIdPrefix: io.github.clashmax
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ARCHS: "$(ARCHS_STANDARD)"
    ONLY_ACTIVE_ARCH: NO
packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "6.2.1"
  Pow:
    url: https://github.com/EmergeTools/Pow.git
    from: "1.0.0"
targets:
  ClashMax:
    type: application
    platform: macOS
    sources:
      - path: Shared
      - path: ClashMax
    resources:
      - path: Resources
    dependencies:
      - package: Yams
      - package: Pow
      - target: ClashMaxHelper
        embed: false
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax
        PRODUCT_NAME: ClashMax
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: ClashMax
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_NSHumanReadableCopyright: GPL-3.0
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    entitlements:
      path: Config/ClashMax.entitlements
    postCompileScripts:
      - name: Clean Bundle Extended Attributes
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          if [ -d "$TARGET_BUILD_DIR/$WRAPPER_NAME" ]; then
            xattr -cr "$TARGET_BUILD_DIR/$WRAPPER_NAME"
          fi
      - name: Embed Helper
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/ClashMaxHelper"
          - "$(SRCROOT)/Config/io.github.clashmax.ClashMax.Helper.plist"
          - "$(SRCROOT)/Resources/Core/README.md"
          - "$(SRCROOT)/Resources/Core/mihomo-darwin-amd64"
          - "$(SRCROOT)/Resources/Core/mihomo-darwin-arm64"
          - "$(SRCROOT)/Resources/Core/mihomo-manifest.json"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchServices/ClashMaxHelper"
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Library/LaunchDaemons/io.github.clashmax.ClashMax.Helper.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/README.md"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-darwin-amd64"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-darwin-arm64"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/Core/mihomo-manifest.json"
        script: |
          set -euo pipefail
          launch_services="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchServices"
          launch_daemons="$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          core_resources="$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/Core"
          mkdir -p "$launch_services" "$launch_daemons" "$core_resources"
          cp "$BUILT_PRODUCTS_DIR/ClashMaxHelper" "$launch_services/ClashMaxHelper"
          cp "$SRCROOT/Config/io.github.clashmax.ClashMax.Helper.plist" "$launch_daemons/io.github.clashmax.ClashMax.Helper.plist"
          cp -R "$SRCROOT/Resources/Core/." "$core_resources/"
  ClashMaxHelper:
    type: tool
    platform: macOS
    sources:
      - path: Shared
      - path: ClashMaxHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMax.Helper
        PRODUCT_NAME: ClashMaxHelper
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Config/ClashMaxHelper-Info.plist
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        MACH_O_TYPE: mh_execute
    entitlements:
      path: Config/ClashMaxHelper.entitlements
  ClashMaxTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ClashMaxTests
    dependencies:
      - target: ClashMax
      - package: Yams
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.clashmax.ClashMaxTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ClashMax.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/ClashMax"
        BUNDLE_LOADER: "$(TEST_HOST)"
